<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Playlist Pilot{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100">
{% import "macros.html" as macros %}
  <header class="bg-gray-800 text-white text-center py-4">
    <h1 class="text-2xl font-bold">🎶 Playlist Pilot</h1>
  </header>

  <nav class="sticky top-0 bg-white dark:bg-gray-800 shadow z-50 flex gap-4 p-2 justify-center">
    {{ macros.nav(request) }}
  </nav>

  <div id="integration-failures" class="text-center text-red-600 text-sm"></div>

  <main class="max-w-screen-xl mx-auto p-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-8 bg-gray-200 dark:bg-gray-800 text-center p-4 text-sm text-gray-700 dark:text-gray-300">
    <p>Playlist Pilot — Curate your soundtrack.</p>
  </footer>
  <script>
    const monitoringEndpoint = '/api/v1/integration-failures';
    const integrationFailuresElement = document.getElementById('integration-failures');

    fetch(monitoringEndpoint)
      .then(r => r.json())
      .then(data => {
        if (!integrationFailuresElement) return;
        const entries = Object.entries(data.failures || {})
          .filter(([, value]) => value > 0);
        if (entries.length) {
          integrationFailuresElement.textContent = 'Integration failures: ' +
            entries.map(([k, v]) => `${k} (${v})`).join(', ');
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
